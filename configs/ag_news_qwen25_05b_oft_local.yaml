experiment_name: ag-news-qwen25-05b-oft-local
output_root: outputs
seed: 42
device: auto

dataset:
  source: ag_news
  name: ag_news
  text_column: text
  label_column: label
  label_names:
    - World
    - Sports
    - Business
    - Sci/Tech
  max_train_samples: null
  max_eval_samples: 2000
  max_predict_samples: 32

model:
  architecture: qwen2
  use_pretrained: true
  model_name_or_path: local_models/Qwen2.5-0.5B-Instruct
  tokenizer_name_or_path: local_models/Qwen2.5-0.5B-Instruct
  local_files_only: true
  max_length: 256

training:
  finetuning_mode: oft
  epochs: 3
  batch_size: 2
  eval_batch_size: 4
  learning_rate: 0.0005
  weight_decay: 0.01
  warmup_ratio: 0.06
  gradient_accumulation_steps: 8
  gradient_clip_norm: 1.0
  log_every_steps: 50
  num_workers: 0

oft:
  r: null
  oft_block_size: 64
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  modules_to_save:
    - score
  bias: none

