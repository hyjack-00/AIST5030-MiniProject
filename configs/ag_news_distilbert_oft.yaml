experiment_name: ag-news-distilbert-oft
output_root: outputs
seed: 42
device: auto

dataset:
  source: ag_news
  name: ag_news
  text_column: text
  label_column: label
  label_names:
    - World
    - Sports
    - Business
    - Sci/Tech
  max_train_samples: null
  max_eval_samples: 2000
  max_predict_samples: 32

model:
  architecture: distilbert
  use_pretrained: true
  model_name_or_path: distilbert-base-uncased
  tokenizer_name_or_path: distilbert-base-uncased
  local_files_only: false
  max_length: 128

training:
  finetuning_mode: oft
  epochs: 3
  batch_size: 16
  eval_batch_size: 32
  learning_rate: 0.0005
  weight_decay: 0.01
  warmup_ratio: 0.06
  gradient_accumulation_steps: 1
  gradient_clip_norm: 1.0
  log_every_steps: 50
  num_workers: 0

oft:
  r: null
  oft_block_size: 32
  target_modules:
    - q_lin
    - k_lin
    - v_lin
    - out_lin
  modules_to_save:
    - pre_classifier
    - classifier
  bias: none
